<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cooking Collection</title>
  <style>
    body {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
      font-family: Arial, sans-serif;
      line-height: 1.6;
      color: #111;
      background: #fff;
    }

    h1 {
      margin-bottom: 30px;
    }

    .dish {
      margin-bottom: 44px;
    }

    .dish-name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .dish img {
      width: 100%;
      max-width: 700px;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    .back-link {
      display: inline-block;
      margin-top: 10px;
    }
  </style>

<body>
  <h1>Cooking Collection</h1>

  <div class="dish">
    <div class="dish-name">Steak, Garlic Chive, and Creamy Seafood Udon</div>

  </div>

  <div class="dish">
    <div class="dish-name">Kimbap</div>
    <img src="./images/kimbap.jpg" alt="Kimbap">
  </div>

  <div class="dish">
    <div class="dish-name">Braised Spare Ribs</div>
    <img src="./images/braised-spare-ribs.jpg" alt="Braised Spare Ribs">

    <div class="dish-name">Braised Pork Belly with Quail Eggs</div>

    <div class="dish-name">Soy-Braised Pork Ribs</div>
    <img src="./images/soy-braised-pork-ribs.jpg" alt="Soy-Braised Pork Ribs">
  </div>

  <div class="dish">
    <div class="dish-name">Stir-Fried Pork with Bamboo Shoots</div>
    <img src="./images/stir-fried-pork-bamboo-shoots.jpg" alt="Stir-Fried Pork with Bamboo Shoots">
